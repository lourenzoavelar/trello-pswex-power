<!DOCTYPE html>
<html class="light" lang="pt-br">
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-primary": "#ffffff",
            "primary-container": "#4f46e4",
            "surface": "#f8f9fa",
            "on-surface": "#191c1d",
            "on-surface-variant": "#464555",
            "surface-container-low": "#f3f4f5",
            "surface-container-high": "#e7e8e9",
            "surface-container-lowest": "#ffffff",
            "primary": "#3626cc",
            "outline-variant": "#c7c4d8",
            "outline": "#777587"
          },
          "fontFamily": {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .feedback {
      display: none;
      font-size: 13px;
      color: #006644;
      font-weight: 600;
      text-align: center;
      margin-top: 8px;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #dce2f3; border-radius: 4px; }
  </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary m-0 overflow-x-hidden">
  <div id="content" class="bg-surface-container-lowest w-full min-h-screen">
    
    <form id="trello-form" class="space-y-0" onsubmit="event.preventDefault();">

      <!-- Cliente / Projeto (Global) -->
      <div class="p-4 pb-2 bg-surface-container-lowest">
        <div class="space-y-1 mb-2">
          <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5">
            <i class="fa-solid fa-briefcase text-on-surface-variant/70"></i> Cliente/Projeto
          </label>
          <select id="clientProject" class="w-full p-2 text-[13px] rounded-md border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface bg-surface-container-low cursor-pointer shadow-sm">
            <option value="">Selecione um cliente...</option>
          </select>
        </div>
      </div>

      <!-- Header Tabs -->
      <div class="flex border-b border-outline-variant/30 px-3 bg-surface-container-lowest sticky top-0 z-10">
        <button id="tab-post" class="tab-btn active flex-1 font-semibold text-[13px] py-3 border-b-2 border-primary text-primary transition-colors cursor-pointer flex items-center justify-center gap-1.5">
          <i class="fa-solid fa-pen-nib text-[14px]"></i> Publicação e Design
        </button>
        <button id="tab-ad" class="tab-btn flex-1 font-medium text-[13px] py-3 border-b-2 border-transparent text-on-surface-variant hover:text-on-surface transition-colors cursor-pointer flex items-center justify-center gap-1.5">
          <i class="fa-solid fa-bullhorn text-[14px]"></i> Anúncio e Copy
        </button>
        <button id="tab-ia" class="tab-btn flex-1 font-medium text-[13px] py-3 border-b-2 border-transparent text-on-surface-variant hover:text-on-surface transition-colors cursor-pointer flex items-center justify-center gap-1.5">
          <i class="fa-solid fa-wand-magic-sparkles text-[14px]"></i> IA
        </button>
      </div>

      <!-- Form Content -->
      <div class="p-4 space-y-4">

        <!-- ABA 1: CAMPOS DO POST -->
        <div id="content-post" class="tab-content block space-y-5">
        
        <!-- Redes Sociais -->
        <div class="space-y-2">
          <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5">
            <i class="fa-solid fa-share-nodes text-on-surface-variant/70"></i> Publicar nos Seguintes Canais
          </label>
          <div class="flex flex-wrap gap-2">
            <label class="cursor-pointer relative group" title="Instagram">
              <input type="checkbox" class="peer hidden social-checkbox" value="Instagram">
              <div class="w-[34px] h-[34px] flex items-center justify-center rounded border border-outline-variant text-on-surface-variant bg-surface-container-low peer-checked:bg-[#E1306C] peer-checked:text-white peer-checked:border-[#E1306C] transition-colors hover:bg-surface-container-high shadow-sm">
                <i class="fa-brands fa-instagram text-[16px]"></i>
              </div>
            </label>
            <label class="cursor-pointer relative group" title="Facebook">
              <input type="checkbox" class="peer hidden social-checkbox" value="Facebook">
              <div class="w-[34px] h-[34px] flex items-center justify-center rounded border border-outline-variant text-on-surface-variant bg-surface-container-low peer-checked:bg-[#1877F2] peer-checked:text-white peer-checked:border-[#1877F2] transition-colors hover:bg-surface-container-high shadow-sm">
                <i class="fa-brands fa-facebook-f text-[16px]"></i>
              </div>
            </label>
            <label class="cursor-pointer relative group" title="YouTube">
              <input type="checkbox" class="peer hidden social-checkbox" value="YouTube">
              <div class="w-[34px] h-[34px] flex items-center justify-center rounded border border-outline-variant text-on-surface-variant bg-surface-container-low peer-checked:bg-[#FF0000] peer-checked:text-white peer-checked:border-[#FF0000] transition-colors hover:bg-surface-container-high shadow-sm">
                <i class="fa-brands fa-youtube text-[16px]"></i>
              </div>
            </label>
            <label class="cursor-pointer relative group" title="TikTok">
              <input type="checkbox" class="peer hidden social-checkbox" value="TikTok">
              <div class="w-[34px] h-[34px] flex items-center justify-center rounded border border-outline-variant text-on-surface-variant bg-surface-container-low peer-checked:bg-[#000000] peer-checked:text-white peer-checked:border-[#000000] transition-colors hover:bg-surface-container-high shadow-sm">
                <i class="fa-brands fa-tiktok text-[16px] peer-checked:text-[#00f2fe]"></i>
              </div>
            </label>
            <label class="cursor-pointer relative group" title="LinkedIn">
              <input type="checkbox" class="peer hidden social-checkbox" value="LinkedIn">
              <div class="w-[34px] h-[34px] flex items-center justify-center rounded border border-outline-variant text-on-surface-variant bg-surface-container-low peer-checked:bg-[#0A66C2] peer-checked:text-white peer-checked:border-[#0A66C2] transition-colors hover:bg-surface-container-high shadow-sm">
                <i class="fa-brands fa-linkedin-in text-[16px]"></i>
              </div>
            </label>
            <label class="cursor-pointer relative group" title="Google">
              <input type="checkbox" class="peer hidden social-checkbox" value="Google">
              <div class="w-[34px] h-[34px] flex items-center justify-center rounded border border-outline-variant text-on-surface-variant bg-surface-container-low peer-checked:bg-[#DB4437] peer-checked:text-white peer-checked:border-[#DB4437] transition-colors hover:bg-surface-container-high shadow-sm">
                <i class="fa-brands fa-google text-[16px]"></i>
              </div>
            </label>
            <label class="cursor-pointer relative group" title="Outros">
              <input type="checkbox" class="peer hidden social-checkbox" value="Outro">
              <div class="w-[34px] h-[34px] flex items-center justify-center rounded border border-outline-variant text-on-surface-variant bg-surface-container-low peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary transition-colors hover:bg-surface-container-high shadow-sm">
                <i class="fa-solid fa-ellipsis text-[16px]"></i>
              </div>
            </label>
          </div>
        </div>

        <!-- Legenda do post -->
        <div class="space-y-1 relative">
          <div class="flex justify-between items-center pr-1">
            <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5">
              <i class="fa-regular fa-comment-dots text-on-surface-variant/70"></i> Legenda do post
            </label>
            <div class="flex gap-1 items-center">
              <button type="button" class="btn-ai text-purple-500 hover:text-purple-700 bg-purple-100/50 hover:bg-purple-100 transition-colors relative flex items-center justify-center w-6 h-6 rounded" data-target="post-caption" title="Gerar com IA">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-[14px] h-[14px] fill-current"><path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08-4.778 2.758a.795.795 0 0 0-.393.681zm1.097-2.365 2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5Z"></path></svg>
              </button>
              <button type="button" class="btn-copy text-on-surface-variant hover:text-primary transition-colors relative flex items-center justify-center w-6 h-6 rounded hover:bg-surface-container-high" data-target="post-caption" title="Copiar legenda">
                <span class="material-symbols-outlined text-[16px]">content_copy</span>
                <span class="tooltip-copy absolute -top-7 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-[10px] py-1 px-2 rounded opacity-0 transition-opacity pointer-events-none whitespace-nowrap z-20">Copiado!</span>
              </button>
            </div>
          </div>
          <textarea id="post-caption" class="w-full min-h-[90px] p-2.5 text-[13px] rounded-md border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface bg-surface-container-low resize-y shadow-sm"></textarea>
        </div>

        <div class="space-y-4">
          <div class="space-y-1 relative">
            <div class="flex justify-between items-center pr-1">
              <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5">
                <i class="fa-solid fa-wand-magic-sparkles text-on-surface-variant/70"></i> Instruções e sugestões de design
              </label>
              <button type="button" class="btn-ai text-purple-500 hover:text-purple-700 bg-purple-100/50 hover:bg-purple-100 transition-colors relative flex items-center justify-center w-6 h-6 rounded" data-target="art-guidelines" title="Gerar com IA">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-[14px] h-[14px] fill-current"><path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08-4.778 2.758a.795.795 0 0 0-.393.681zm1.097-2.365 2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5Z"></path></svg>
              </button>
            </div>
            <textarea id="art-guidelines" class="w-full min-h-[60px] p-2.5 text-[13px] rounded-md border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface bg-surface-container-low resize-y shadow-sm"></textarea>
          </div>

          <div class="space-y-1 relative">
            <div class="flex justify-between items-center pr-1">
              <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5">
                <i class="fa-solid fa-font text-on-surface-variant/70"></i> Texto na arte/video
              </label>
              <div class="flex gap-1 items-center">
                <button type="button" class="btn-ai text-purple-500 hover:text-purple-700 bg-purple-100/50 hover:bg-purple-100 transition-colors relative flex items-center justify-center w-6 h-6 rounded" data-target="art-text" title="Gerar com IA">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-[14px] h-[14px] fill-current"><path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08-4.778 2.758a.795.795 0 0 0-.393.681zm1.097-2.365 2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5Z"></path></svg>
                </button>
                <button type="button" class="btn-copy text-on-surface-variant hover:text-primary transition-colors relative flex items-center justify-center w-6 h-6 rounded hover:bg-surface-container-high" data-target="art-text" title="Copiar texto da arte">
                  <span class="material-symbols-outlined text-[16px]">content_copy</span>
                  <span class="tooltip-copy absolute -top-7 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-[10px] py-1 px-2 rounded opacity-0 transition-opacity pointer-events-none whitespace-nowrap z-20">Copiado!</span>
                </button>
              </div>
            </div>
            <textarea id="art-text" class="w-full min-h-[60px] p-2.5 text-[13px] rounded-md border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface bg-surface-container-low resize-y shadow-sm"></textarea>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="space-y-1">
              <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5">
                <i class="fa-solid fa-link text-on-surface-variant/70"></i> Criativo Finalizado
              </label>
              <input type="url" id="final-creative-link" placeholder="Link da imagem/vídeo" class="w-full p-2 text-[13px] rounded-md border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface bg-surface-container-low shadow-sm"/>
            </div>
            <div class="space-y-1">
              <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5">
                <i class="fa-solid fa-download text-on-surface-variant/70"></i> Mídia Pronta
              </label>
              <input type="url" id="ready-media-link" placeholder="Link (Download)" class="w-full p-2 text-[13px] rounded-md border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface bg-surface-container-low shadow-sm"/>
            </div>
          </div>
          <div class="space-y-1">
            <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5">
              <i class="fa-solid fa-layer-group text-on-surface-variant/70"></i> Formato
            </label>
            <select id="creative-format" class="w-full p-2 text-[13px] rounded-md border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface bg-surface-container-low cursor-pointer shadow-sm">
              <option value="">Selecione...</option>
              <option value="Feed + Story Imagem">🟩Feed + 📱Story Imagem</option>
              <option value="Feed imagem única">🟩Feed imagem única</option>
              <option value="Feed carrossel Imagem">🗂️Feed carrossel Imagem</option>
              <option value="Story Imagem única">📱Story Imagem única</option>
              <option value="Feed Vídeo 1x1">▶️Feed Vídeo 1x1</option>
              <option value="Reels Vídeo">🎞️Reels Vídeo</option>
              <option value="Feed+Reels Vídeo">🟩Feed + 🎞️Reels Vídeo</option>
              <option value="Feed imagem + Reels Vídeo">🟩Feed Imagem + 🎞️Reels Vídeo</option>
              <option value="Feed (img+vid) + Reels">🟩Feed (Img+Vid) + 🎞️Reels</option>
              <option value="Video Youtube 16x9">📺Vídeo Youtube 16x9</option>
            </select>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-3 pt-2">
            <div class="space-y-1">
              <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5">
                <i class="fa-regular fa-calendar-check text-on-surface-variant/70"></i> Agendar postagem para
              </label>
              <input type="date" id="postDate" class="w-full p-2 text-[13px] rounded-md border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface bg-surface-container-low shadow-sm"/>
            </div>
            <div class="space-y-1">
              <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5">
                <i class="fa-solid fa-clock text-on-surface-variant/70"></i> Agendado para
              </label>
              <input type="date" id="scheduledDate" class="w-full p-2 text-[13px] rounded-md border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface bg-surface-container-low shadow-sm"/>
            </div>
          </div>
        </div>
      </div>

      <!-- ABA 2: CAMPOS DO ANUNCIO -->
      <div id="content-ad" class="tab-content hidden space-y-5">
        <div class="space-y-1 relative">
          <div class="flex justify-between items-center pr-1">
            <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5">
              <i class="fa-solid fa-align-left text-on-surface-variant/70"></i> Texto Principal
            </label>
            <div class="flex gap-1 items-center">
              <button type="button" class="btn-ai text-purple-500 hover:text-purple-700 bg-purple-100/50 hover:bg-purple-100 transition-colors relative flex items-center justify-center w-6 h-6 rounded" data-target="ad-main-text" title="Gerar com IA">

          </div>
          <div class="space-y-2 ml-5">
            <div class="flex items-center gap-1">
              <span class="text-[11px] text-on-surface-variant font-semibold w-12 shrink-0">Titulo 01</span>
              <input type="text" id="ad-title-1" class="w-full p-2 text-[13px] rounded-md border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface bg-surface-container-low shadow-sm"/>
              <button type="button" class="btn-ai shrink-0 text-purple-500 hover:text-purple-700 bg-purple-100/50 hover:bg-purple-100 transition-colors relative flex items-center justify-center w-7 h-7 rounded" data-target="ad-title-1" title="Gerar com IA"><i class="fa-solid fa-wand-magic-sparkles text-[12px]"></i></button>
            </div>
            <div class="flex items-center gap-1">
              <span class="text-[11px] text-on-surface-variant font-semibold w-12 shrink-0">Titulo 02</span>
              <input type="text" id="ad-title-2" class="w-full p-2 text-[13px] rounded-md border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface bg-surface-container-low shadow-sm"/>

            </div>
            <div class="flex items-center gap-1">
              <span class="text-[11px] text-on-surface-variant font-semibold w-12 shrink-0">Titulo 03</span>
              <input type="text" id="ad-title-3" class="w-full p-2 text-[13px] rounded-md border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface bg-surface-container-low shadow-sm"/>
              <button type="button" class="btn-ai shrink-0 text-purple-500 hover:text-purple-700 bg-purple-100/50 hover:bg-purple-100 transition-colors relative flex items-center justify-center w-7 h-7 rounded" data-target="ad-title-3" title="Gerar com IA"><i class="fa-solid fa-wand-magic-sparkles text-[12px]"></i></button>
            </div>
            <div class="flex items-center gap-1">
              <span class="text-[11px] text-on-surface-variant font-semibold w-12 shrink-0">Titulo 04</span>

            <i class="fa-solid fa-link text-on-surface-variant/70"></i> Agente de IA Oficial

        </div>

        <div class="space-y-1 relative">
          <div class="flex justify-between items-center pr-1">
            <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5">

            </label>
            <button type="button" class="btn-copy text-on-surface-variant hover:text-primary transition-colors relative flex items-center justify-center w-6 h-6 rounded hover:bg-surface-container-high" data-target="ai-prompt-suggest" title="Copiar prompt">

        <button id="btn-save" disabled class="w-full bg-primary disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed text-white text-[13px] font-bold py-3 rounded-md shadow-sm hover:opacity-90 hover:-translate-y-[1px] active:scale-[0.99] disabled:hover:opacity-100 disabled:hover:translate-y-0 disabled:active:scale-100 transition-all flex items-center justify-center gap-1.5" type="button">
