<!DOCTYPE html>
<html class="light" lang="pt-br">
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-primary": "#ffffff",
            "primary-container": "#4f46e4",
            "surface": "#f8f9fa",
            "on-surface": "#191c1d",
            "on-surface-variant": "#464555",
            "surface-container-low": "#f3f4f5",
            "surface-container-high": "#e7e8e9",
            "surface-container-lowest": "#ffffff",
            "primary": "#3626cc",
            "outline-variant": "#c7c4d8",
            "outline": "#777587"
          },
          "fontFamily": {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .primary-gradient {
        background: linear-gradient(135deg, #3626cc 0%, #4f46e4 100%);
    }
    .feedback {
      display: none;
      font-size: 14px;
      color: #006644;
      font-weight: 600;
      text-align: center;
      margin-top: 8px;
    }
    /* Hide scrollbar for a cleaner look if wanted */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #dce2f3; border-radius: 4px; }
  </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary">
  <div id="content" class="px-4 py-6">
    <div class="bg-surface-container-lowest rounded-[24px] shadow-[0_4px_24px_rgba(0,0,0,0.02)] overflow-hidden border border-outline-variant/20">
      
      <!-- Form Content -->
      <form id="trello-form" class="p-6 space-y-8" onsubmit="event.preventDefault();">

        <!-- Rede Social -->
        <section class="space-y-4">
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary" data-icon="share">share</span>
            <h3 class="text-base font-bold font-headline text-on-surface">Redes Sociais</h3>
          </div>
          <div class="grid grid-cols-3 md:grid-cols-4 gap-3" id="social-network-container">
            <!-- Instagram -->
            <label class="group relative flex flex-col items-center justify-center p-3 rounded-xl border border-outline-variant/30 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
              <input class="peer hidden social-checkbox" type="checkbox" value="Instagram"/>
              <span class="material-symbols-outlined mb-1 text-on-surface-variant group-hover:scale-110 transition-transform">camera</span>
              <span class="text-[11px] font-semibold font-label text-on-surface-variant">Instagram</span>
              <div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-1 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
            </label>
            <!-- Facebook -->
            <label class="group relative flex flex-col items-center justify-center p-3 rounded-xl border border-outline-variant/30 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
              <input class="peer hidden social-checkbox" type="checkbox" value="Facebook"/>
              <span class="material-symbols-outlined mb-1 text-on-surface-variant group-hover:scale-110 transition-transform">public</span>
              <span class="text-[11px] font-semibold font-label text-on-surface-variant">Facebook</span>
              <div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-1 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
            </label>
            <!-- YouTube -->
            <label class="group relative flex flex-col items-center justify-center p-3 rounded-xl border border-outline-variant/30 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
              <input class="peer hidden social-checkbox" type="checkbox" value="YouTube"/>
              <span class="material-symbols-outlined mb-1 text-on-surface-variant group-hover:scale-110 transition-transform">smart_display</span>
              <span class="text-[11px] font-semibold font-label text-on-surface-variant">YouTube</span>
              <div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-1 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
            </label>
            <!-- TikTok -->
            <label class="group relative flex flex-col items-center justify-center p-3 rounded-xl border border-outline-variant/30 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
              <input class="peer hidden social-checkbox" type="checkbox" value="TikTok"/>
              <span class="material-symbols-outlined mb-1 text-on-surface-variant group-hover:scale-110 transition-transform">music_note</span>
              <span class="text-[11px] font-semibold font-label text-on-surface-variant">TikTok</span>
              <div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-1 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
            </label>
            <!-- LinkedIn -->
            <label class="group relative flex flex-col items-center justify-center p-3 rounded-xl border border-outline-variant/30 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
              <input class="peer hidden social-checkbox" type="checkbox" value="LinkedIn"/>
              <span class="material-symbols-outlined mb-1 text-on-surface-variant group-hover:scale-110 transition-transform">business_center</span>
              <span class="text-[11px] font-semibold font-label text-on-surface-variant">LinkedIn</span>
              <div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-1 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
            </label>
            <!-- Google -->
            <label class="group relative flex flex-col items-center justify-center p-3 rounded-xl border border-outline-variant/30 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
              <input class="peer hidden social-checkbox" type="checkbox" value="Google"/>
              <span class="material-symbols-outlined mb-1 text-on-surface-variant group-hover:scale-110 transition-transform">language</span>
              <span class="text-[11px] font-semibold font-label text-on-surface-variant">Google</span>
              <div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-1 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
            </label>
            <!-- Outros -->
            <label class="group relative flex flex-col items-center justify-center p-3 rounded-xl border border-outline-variant/30 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
              <input class="peer hidden social-checkbox" type="checkbox" value="Outro"/>
              <span class="material-symbols-outlined mb-1 text-on-surface-variant group-hover:scale-110 transition-transform">more_horiz</span>
              <span class="text-[11px] font-semibold font-label text-on-surface-variant">Outros</span>
              <div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-1 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
            </label>
          </div>
        </section>

        <!-- Legenda -->
        <section class="space-y-4">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="material-symbols-outlined text-primary">description</span>
              <h3 class="text-base font-bold font-headline text-on-surface">Legenda do post</h3>
            </div>
            <button id="btn-copy-caption" class="flex items-center gap-1.5 text-primary font-bold text-[11px] bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-lg transition-all active:scale-95" type="button">
              <span class="material-symbols-outlined text-sm">content_copy</span>
              Copiar
            </button>
          </div>
          <textarea id="post-caption" class="w-full min-h-[100px] p-4 text-sm rounded-xl bg-surface-container-low border border-outline-variant/30 focus:border-transparent focus:ring-2 focus:ring-primary/40 text-on-surface placeholder:text-on-surface-variant/40 resize-y font-body leading-relaxed"></textarea>
          <div id="feedback-copy" class="text-[11px] text-[#006644] font-bold text-right hidden">Legenda copiada!</div>
        </section>

        <!-- Outros detalhes -->
        <section class="space-y-6 block">
          
          <div class="space-y-2">
            <label class="text-[11px] font-bold font-label text-on-surface-variant tracking-wider uppercase ml-1 flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">palette</span> Orientações da arte</label>
            <textarea id="art-guidelines" class="w-full min-h-[80px] p-3 rounded-xl bg-surface-container-low border border-outline-variant/30 focus:border-transparent focus:ring-2 focus:ring-primary/40 text-on-surface resize-y text-sm"></textarea>
          </div>
          
          <div class="space-y-2">
            <label class="text-[11px] font-bold font-label text-on-surface-variant tracking-wider uppercase ml-1 flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">title</span>Texto na arte</label>
            <textarea id="art-text" class="w-full min-h-[80px] p-3 rounded-xl bg-surface-container-low border border-outline-variant/30 focus:border-transparent focus:ring-2 focus:ring-primary/40 text-on-surface resize-y text-sm"></textarea>
          </div>

          <div class="space-y-2">
            <label class="text-[11px] font-bold font-label text-on-surface-variant tracking-wider uppercase ml-1 flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">link</span>Link do criativo finalizado</label>
            <input type="url" id="final-creative-link" class="w-full px-4 py-3 rounded-xl bg-surface-container-low border border-outline-variant/30 focus:border-transparent focus:ring-2 focus:ring-primary/40 text-on-surface text-sm"/>
          </div>

          <div class="space-y-2">
            <label class="text-[11px] font-bold font-label text-on-surface-variant tracking-wider uppercase ml-1 flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">cloud_download</span>⬇️ Link mídia pronta</label>
            <input type="url" id="ready-media-link" class="w-full px-4 py-3 rounded-xl bg-surface-container-low border border-outline-variant/30 focus:border-transparent focus:ring-2 focus:ring-primary/40 text-on-surface text-sm"/>
          </div>

          <div class="space-y-2">
            <label class="text-[11px] font-bold font-label text-on-surface-variant tracking-wider uppercase ml-1 flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">aspect_ratio</span>Formato do criativo</label>
            <select id="creative-format" class="w-full px-4 py-3 rounded-xl bg-surface-container-low border border-outline-variant/30 focus:border-transparent focus:ring-2 focus:ring-primary/40 text-on-surface text-sm cursor-pointer">
              <option value="">Selecione...</option>
              <option value="🖼️📱Feed + Story Imagem">🖼️📱Feed + Story Imagem</option>
              <option value="🖼️ Feed imagem única">🖼️ Feed imagem única</option>
              <option value="🖼️🖼️🖼️Feed carrossel Imagem">🖼️🖼️🖼️Feed carrossel Imagem</option>
              <option value="📱Story Imagem única">📱Story Imagem única</option>
              <option value="▶️Feed Vídeo 1x1">▶️Feed Vídeo 1x1</option>
              <option value="▶️🎴Reels Vídeo">▶️🎴Reels Vídeo</option>
              <option value="▶️🎴Feed+Reels Vídeo">▶️🎴Feed+Reels Vídeo</option>
              <option value="🖼️🎴Feed imagem + Reels Vídeo">🖼️🎴Feed imagem + Reels Vídeo</option>
              <option value="🖼️▶️🎴Feed imagem e video + Reels Vídeo">🖼️▶️🎴Feed imagem e video + Reels Vídeo</option>
              <option value="▶️💻Video Youtube 16x9">▶️💻Video Youtube 16x9</option>
            </select>
          </div>

        </section>

        <!-- Action Button -->
        <div class="pt-4 pb-2">
          <button id="btn-save" class="w-full primary-gradient text-on-primary font-bold py-4 rounded-xl shadow-md hover:shadow-lg shadow-primary/20 hover:-translate-y-0.5 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
            <span class="material-symbols-outlined text-lg">save</span>
            Salvar Dados
          </button>
          <div id="feedback-save" class="feedback w-full">Dados salvos com sucesso!</div>
        </div>
      </form>
    </div>
  </div>

  <script src="./card-custom-fields.js"></script>
</body>
</html>
