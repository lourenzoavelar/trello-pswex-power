<!DOCTYPE html>

<html class="light" lang="pt-br"><head>

<title>Creative Hub - Power-Up Configuration</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1;
        }
        .primary-gradient {
            background: linear-gradient(135deg, #3626cc 0%, #4f46e4 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-[#f8f9fa] dark:bg-slate-950 sticky top-0 z-40 bg-[#f3f4f5] dark:bg-slate-900 border-none">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#4F46E5] dark:text-[#818cf8]" data-icon="grid_view">grid_view</span>
<h1 class="text-xl font-bold tracking-tight text-[#191c1d] dark:text-white font-manrope">Creative Hub</h1>
</div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-[#4F46E5] dark:text-[#818cf8] font-bold text-sm transition-all hover:bg-indigo-50 dark:hover:bg-indigo-900/20 px-3 py-1 rounded-lg" href="#">Workspace</a>
<a class="text-slate-500 dark:text-slate-400 text-sm transition-all hover:bg-indigo-50 dark:hover:bg-indigo-900/20 px-3 py-1 rounded-lg" href="#">Configuration</a>
<a class="text-slate-500 dark:text-slate-400 text-sm transition-all hover:bg-indigo-50 dark:hover:bg-indigo-900/20 px-3 py-1 rounded-lg" href="#">History</a>
<a class="text-slate-500 dark:text-slate-400 text-sm transition-all hover:bg-indigo-50 dark:hover:bg-indigo-900/20 px-3 py-1 rounded-lg" href="#">Settings</a>
</nav>
<div class="flex items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
<img alt="User" class="w-full h-full object-cover" data-alt="professional portrait of a creative designer with soft bokeh background and warm lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4gwx_QmZ7Rd7jcPhg3obmWVvFeWD-377D-8_DJq3sFkr6U_EkwKCEp4nM4aC9PswFcz0qX1hD29r0VlgVXKDaADhHq543IbuKsPpfrQB6L09jKe_VFASeqHR7b7m8JKPFQIpnFlT6Msgu4ezEKr5oyGtXXkCl6UtPPqkCotlvnMWx7dykMErZ2YDlS_8FH8zSAQp5NMe20T6-eoX0nXKd83HTe6EONuF3ZFmuLaeQ2LTSsXRs9NQf2rDrOwkwvQo0AljwjEzfoZk"/>
</div>
</div>
</div>
</header>
<main class="max-w-4xl mx-auto px-4 pt-8 pb-32">
<div class="bg-surface-container-lowest rounded-[24px] shadow-[0px_10px_30px_rgba(54,38,204,0.04)] overflow-hidden border border-outline-variant/20">
<!-- Hero Section -->
<div class="relative h-48 w-full">
<div class="absolute inset-0 bg-primary/10">
<img alt="Hero" class="w-full h-full object-cover opacity-60 mix-blend-overlay" data-alt="vibrant abstract background with flowing purple and indigo gradients and subtle crystalline textures" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCPnUPTE-Y1h5Q2VW3gkyEhBoGBryWdtzaq3Z5EzwVko4M4LlIDYS7qYF-LiVCg6-EbtjXnzPZqTIMiU2AVKB_JdriazXcAiE6RtkZU43NLmuF_nKpbP-fAu9uVIj07Ez0WwgJP7SvIPuCrQ5W7JD1oVRnikPvFf6QYfK0qvGajyUD-Y-UqPVElIsEP9s9F-zYj2QmyC1wKVgVoNpJnMInXIRJ6wBMYPN7rXD4kNCM010BM0KGX4fYm3X6j0xBH6MaW7-rgc1uQSLk"/>
</div>
<div class="absolute inset-0 flex items-end p-8 bg-gradient-to-t from-surface-container-lowest to-transparent">
<div class="space-y-1">
<span class="px-3 py-1 rounded-full bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-widest font-label">Trello Power-Up</span>
<h2 class="text-3xl font-extrabold font-headline text-on-surface tracking-tight">Post Configuration</h2>
</div>
</div>
</div>
<!-- Form Content -->
<form class="p-8 space-y-12">
<!-- Section 1: Social Media Grid -->
<section class="space-y-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="share">share</span>
<h3 class="text-lg font-bold font-headline text-on-surface">Redes Sociais</h3>
</div>
<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
<!-- Instagram -->
<label class="group relative flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/20 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
<input class="peer hidden" name="social" type="checkbox" value="instagram"/>
<span class="material-symbols-outlined mb-2 text-on-surface-variant group-hover:scale-110 transition-transform" data-icon="camera">camera</span>
<span class="text-xs font-semibold font-label text-on-surface-variant">Instagram</span>
<div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-2 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
</label>
<!-- Facebook -->
<label class="group relative flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/20 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
<input class="peer hidden" name="social" type="checkbox" value="facebook"/>
<span class="material-symbols-outlined mb-2 text-on-surface-variant group-hover:scale-110 transition-transform" data-icon="public">public</span>
<span class="text-xs font-semibold font-label text-on-surface-variant">Facebook</span>
<div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-2 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
</label>
<!-- YouTube -->
<label class="group relative flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/20 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
<input class="peer hidden" name="social" type="checkbox" value="youtube"/>
<span class="material-symbols-outlined mb-2 text-on-surface-variant group-hover:scale-110 transition-transform" data-icon="smart_display">smart_display</span>
<span class="text-xs font-semibold font-label text-on-surface-variant">YouTube</span>
<div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-2 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
</label>
<!-- TikTok -->
<label class="group relative flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/20 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
<input class="peer hidden" name="social" type="checkbox" value="tiktok"/>
<span class="material-symbols-outlined mb-2 text-on-surface-variant group-hover:scale-110 transition-transform" data-icon="music_note">music_note</span>
<span class="text-xs font-semibold font-label text-on-surface-variant">TikTok</span>
<div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-2 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
</label>
<!-- LinkedIn -->
<label class="group relative flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/20 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
<input class="peer hidden" name="social" type="checkbox" value="linkedin"/>
<span class="material-symbols-outlined mb-2 text-on-surface-variant group-hover:scale-110 transition-transform" data-icon="business_center">business_center</span>
<span class="text-xs font-semibold font-label text-on-surface-variant">LinkedIn</span>
<div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-2 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
</label>
<!-- Google -->
<label class="group relative flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/20 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
<input class="peer hidden" name="social" type="checkbox" value="google"/>
<span class="material-symbols-outlined mb-2 text-on-surface-variant group-hover:scale-110 transition-transform" data-icon="language">language</span>
<span class="text-xs font-semibold font-label text-on-surface-variant">Google</span>
<div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-2 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
</label>
<!-- Other -->
<label class="group relative flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant/20 bg-surface-container-low hover:bg-surface-container-high transition-all cursor-pointer">
<input class="peer hidden" name="social" type="checkbox" value="other"/>
<span class="material-symbols-outlined mb-2 text-on-surface-variant group-hover:scale-110 transition-transform" data-icon="more_horiz">more_horiz</span>
<span class="text-xs font-semibold font-label text-on-surface-variant">Outros</span>
<div class="absolute inset-0 rounded-xl ring-2 ring-primary ring-offset-2 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none"></div>
</label>
</div>
</section>
<!-- Section 2: Post Caption -->
<section class="space-y-6">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="description">description</span>
<h3 class="text-lg font-bold font-headline text-on-surface">Legenda do post</h3>
</div>
<button class="flex items-center gap-2 text-primary font-bold text-sm bg-indigo-50 hover:bg-indigo-100 px-4 py-2 rounded-lg transition-all active:scale-95" type="button">
<span class="material-symbols-outlined text-sm" data-icon="content_copy">content_copy</span>
                            Copiar Legenda
                        </button>
</div>
<textarea class="w-full min-h-[160px] p-6 rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-on-surface-variant/40 resize-none font-body leading-relaxed" placeholder="Escreva a legenda definitiva para esta publicação..."></textarea>
</section>
<!-- Section 3: Creative Details -->
<section class="space-y-8">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="palette">palette</span>
<h3 class="text-lg font-bold font-headline text-on-surface">Detalhes do Criativo</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="space-y-2">
<label class="text-xs font-bold font-label text-on-surface-variant tracking-wider uppercase ml-1">Orientações da arte</label>
<textarea class="w-full min-h-[120px] p-4 rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-on-surface-variant/40 resize-none text-sm" placeholder="Briefing visual e referências..."></textarea>
</div>
<div class="space-y-2">
<label class="text-xs font-bold font-label text-on-surface-variant tracking-wider uppercase ml-1">Texto na arte</label>
<textarea class="w-full min-h-[120px] p-4 rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-on-surface-variant/40 resize-none text-sm" placeholder="Headline e copies da imagem..."></textarea>
</div>
</div>
<div class="space-y-6">
<div class="space-y-2">
<label class="text-xs font-bold font-label text-on-surface-variant tracking-wider uppercase ml-1">Link do criativo finalizado (Canva, Figma, PSD)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="link">link</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 text-on-surface text-sm" placeholder="https://..." type="url"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold font-label text-on-surface-variant tracking-wider uppercase ml-1">Link mídia pronta (PNG, MP4, etc)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="cloud_download">cloud_download</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 text-on-surface text-sm" placeholder="https://..." type="url"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold font-label text-on-surface-variant tracking-wider uppercase ml-1">Formato do criativo</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="aspect_ratio">aspect_ratio</span>
<select class="w-full pl-12 pr-4 py-4 rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary/20 text-on-surface text-sm appearance-none">
<option value="">Selecione o formato</option>
<option value="feed_square">Feed (1:1)</option>
<option value="feed_portrait">Feed Portrait (4:5)</option>
<option value="stories">Stories/Reels (9:16)</option>
<option value="landscape">Landscape (16:9)</option>
</select>
</div>
</div>
</div>
</section>
<!-- Action Button -->
<div class="pt-6">
<button class="w-full primary-gradient text-on-primary font-bold py-5 rounded-2xl shadow-xl shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="submit">
<span class="material-symbols-outlined" data-icon="save">save</span>
                        Salvar Dados do Power-Up
                    </button>
</div>
</form>
</div>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl flex justify-around items-center px-4 pb-6 pt-3 shadow-[0px_-10px_30px_rgba(54,38,204,0.04)] rounded-t-[24px]">
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#4F46E5] transition-colors">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="text-[11px] font-semibold tracking-wide uppercase mt-1">Workspace</span>
</button>
<button class="flex flex-col items-center justify-center bg-indigo-50 dark:bg-indigo-900/40 text-[#4F46E5] dark:text-[#818cf8] rounded-2xl px-5 py-2 scale-90">
<span class="material-symbols-outlined active-icon" data-icon="settings_input_component">settings_input_component</span>
<span class="text-[11px] font-semibold tracking-wide uppercase mt-1">Config</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#4F46E5] transition-colors">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="text-[11px] font-semibold tracking-wide uppercase mt-1">History</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#4F46E5] transition-colors">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-[11px] font-semibold tracking-wide uppercase mt-1">Settings</span>
</button>
</nav>
</body></html>
